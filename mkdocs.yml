site_name: Hermes Desktop 教學
site_description: 用 Hermes Desktop + OpenRouter
site_url: https://lopentu.github.io/hermes-desktop-tutorial/

theme:
  name: material
  language: zh-TW
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.top
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
      title: 目錄
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
