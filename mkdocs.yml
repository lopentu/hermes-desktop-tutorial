site_name: Hermes Desktop 教學
site_description: 用 Hermes Desktop + OpenRouter
site_url: https://lopentu.github.io/hermes-desktop-tutorial/

theme:
  name: material
  language: zh-TW
  palette:
    scheme: default
    # Custom brand color (#304535) is defined in stylesheets/extra.css
  features:
    - navigation.top
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
      title: 目錄
  - tables
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  # Enables inline Material icons via :material-...: shortcodes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
